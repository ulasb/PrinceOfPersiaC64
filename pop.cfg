# ld65 config — PRG $0801-$cfff, VIC bank 2 (matrix $8c00, bitmap $a000)
# GFXH loads inside the bitmap hole and is copied to $e000 at init.
MEMORY {
    ZP:   file = "", start = $0002, size = $00fa, type = rw, define = yes;
    RAM2: file = "", start = $0200, size = $0200, type = rw;
    MAIN: file = %O, start = $07ff, size = $4801, fill = yes;
    W1:   file = %O, start = $5000, size = $3a80, fill = yes;
    SPR:  file = %O, start = $8a80, size = $0180, fill = yes;
    MTX:  file = %O, start = $8c00, size = $0400, fill = yes;
    W9:   file = %O, start = $9000, size = $1000, fill = yes;
    BMH:  file = %O, start = $a000, size = $2000, fill = yes;
    WC:   file = %O, start = $c000, size = $1000, fill = no;
    HIRAM: file = "", start = $d000, size = $0a00, type = rw;
}
SEGMENTS {
    LOADADDR: load = MAIN, type = ro;
    EXEHDR:   load = MAIN, type = ro;
    STARTUP:  load = MAIN, type = ro;
    CODE:     load = MAIN, type = ro,  optional = yes;
    RODATA:   load = MAIN, type = ro,  optional = yes;
    ANIMDATA: load = MAIN, type = ro,  optional = yes;
    DATA:     load = MAIN, type = rw,  optional = yes;
    BSS:      load = RAM2, type = bss, optional = yes, define = yes;
    ZEROPAGE: load = ZP,   type = zp,  optional = yes;
    GFX1:     load = W1,   type = ro;
    GFX9:     load = W9,   type = ro;
    GFXH:     load = BMH,  type = ro;
    SEQDATA:  load = BMH,  run = HIRAM, type = ro, define = yes;
    GFXC:     load = WC,   type = ro;
}
